<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Observatory｜からだ観測シート</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    html,
    body,
    #root {
      margin: 0;
      min-height: 100%;
      background: #172554;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes drawLine {
      from {
        stroke-dashoffset: 100;
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .line-draw-animation {
      stroke-dasharray: 100;
      animation: drawLine 1s ease-out forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BODY_STARS = [
      { id: 'head', name: 'あたま', x: 50, y: 15 },
      { id: 'throat', name: 'のど', x: 50, y: 25 },
      { id: 'l_shoulder', name: '左かた', x: 25, y: 32 },
      { id: 'r_shoulder', name: '右かた', x: 75, y: 32 },
      { id: 'chest', name: 'むね', x: 50, y: 40 },
      { id: 'stomach', name: 'みぞおち', x: 50, y: 52 },
      { id: 'l_waist', name: '左こし', x: 35, y: 65 },
      { id: 'r_waist', name: '右こし', x: 65, y: 65 },
      { id: 'l_foot', name: '左あし', x: 30, y: 85 },
      { id: 'r_foot', name: '右あし', x: 70, y: 85 },
    ];

    const INITIAL_SHEET = {
      concern: '',
      scene: '',
      avoid: '',
      hope: '',
      tried: '',
      limit: '',
      selfBlame: '',
      structure: '',
      point: '',
      nextStep: '',
    };

    const observationPoints = [
      '背骨',
      '肩・肩甲骨',
      '骨盤・股関節',
      '足首・足裏',
      '呼吸',
      '力み',
      'よくわからない',
    ];

    const nextSteps = [
      'まず記録だけする',
      '小さなセルフケアを試す',
      'サロンで相談する',
      '講座やレッスンを検討する',
      '今は何もしないで様子を見る',
    ];

    function StarryBackground() {
      const [stars, setStars] = useState([]);

      useEffect(() => {
        const generatedStars = Array.from({ length: 150 }).map((_, index) => ({
          id: index,
          x: Math.random() * 100,
          y: Math.random() * 100,
          size: Math.random() * 2 + 0.5,
          opacity: Math.random() * 0.8 + 0.2,
          animationDuration: Math.random() * 3 + 2,
        }));
        setStars(generatedStars);
      }, []);

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none bg-gradient-to-b from-blue-950 via-blue-900 to-blue-700 z-0">
          {stars.map((star) => (
            <div
              key={star.id}
              className="absolute bg-white rounded-full animate-pulse"
              style={{
                left: `${star.x}%`,
                top: `${star.y}%`,
                width: `${star.size}px`,
                height: `${star.size}px`,
                opacity: star.opacity,
                animationDuration: `${star.animationDuration}s`,
                animationIterationCount: 'infinite',
                animationDirection: 'alternate',
              }}
            />
          ))}
        </div>
      );
    }

    function TextAreaField({ label, value, onChange, placeholder }) {
      return (
        <label className="block">
          <span className="block text-white/80 text-sm tracking-wide mb-2">{label}</span>
          <textarea
            value={value}
            onChange={(event) => onChange(event.target.value)}
            placeholder={placeholder}
            rows="3"
            className="w-full rounded-lg bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-yellow-300/80 focus:bg-white/15 transition-colors resize-none"
          />
        </label>
      );
    }

    function SelectField({ label, value, onChange, options }) {
      return (
        <label className="block">
          <span className="block text-white/80 text-sm tracking-wide mb-2">{label}</span>
          <select
            value={value}
            onChange={(event) => onChange(event.target.value)}
            className="w-full rounded-lg bg-white/10 border border-white/20 px-4 py-3 text-white focus:outline-none focus:border-yellow-300/80 focus:bg-blue-950/80 transition-colors"
          >
            <option value="">選択してください</option>
            {options.map((option) => (
              <option key={option} value={option} className="bg-blue-950 text-white">
                {option}
              </option>
            ))}
          </select>
        </label>
      );
    }

    function ObservatorySheet() {
      const [sheet, setSheet] = useState(INITIAL_SHEET);
      const [showMemo, setShowMemo] = useState(false);

      const updateSheet = (key, value) => {
        setSheet((current) => ({ ...current, [key]: value }));
        setShowMemo(false);
      };

      const resetSheet = () => {
        setSheet(INITIAL_SHEET);
        setShowMemo(false);
      };

      const valueOrBlank = (value) => value || 'まだ言葉になっていません';

      return (
        <main className="relative z-20 min-h-[100svh] overflow-y-auto px-5 py-24 sm:px-8">
          <section className="mx-auto max-w-3xl">
            <div className="mb-8 text-center">
              <p className="text-yellow-400 font-serif text-lg tracking-wider mb-2">
                The Observatory
              </p>
              <h1 className="text-white text-2xl sm:text-4xl font-light tracking-widest mb-4 leading-relaxed">
                からだ観測シート 01
              </h1>
              <p className="text-white/85 text-base sm:text-lg tracking-wide mb-2">
                今の身体の現在地
              </p>
              <p className="text-white/70 text-sm sm:text-base leading-7">
                正解を探す前に、今の身体に起きていることを静かに観測するためのシートです。
              </p>
            </div>

            <div className="rounded-lg border border-yellow-200/20 bg-yellow-100/10 px-4 py-4 mb-8 text-white/75 text-xs sm:text-sm leading-6">
              このシートは、身体の状態を自分で観測するためのものです。医療的な診断や治療を目的としたものではありません。
              強い痛み、しびれ、急な症状、日常生活に支障がある場合は、医療機関に相談してください。
            </div>

            <div className="space-y-6 rounded-lg border border-white/15 bg-blue-950/35 backdrop-blur-md p-5 sm:p-8 shadow-2xl">
              <TextAreaField
                label="1. 今いちばん気になる身体のことは？"
                value={sheet.concern}
                onChange={(value) => updateSheet('concern', value)}
                placeholder="例：肩が上がりにくい、歩く時にぎこちない、呼吸が浅い感じがする"
              />

              <TextAreaField
                label="2. それはいつ・どんな場面で出ますか？"
                value={sheet.scene}
                onChange={(value) => updateSheet('scene', value)}
                placeholder="例：朝起きた時、階段を上る時、仕事の後、緊張している時"
              />

              <TextAreaField
                label="3. それがあることで、何を避けていますか？"
                value={sheet.avoid}
                onChange={(value) => updateSheet('avoid', value)}
                placeholder="例：外出、運動、人前で動くこと、長時間歩くこと"
              />

              <TextAreaField
                label="4. それが変わったら、何ができるようになりたいですか？"
                value={sheet.hope}
                onChange={(value) => updateSheet('hope', value)}
                placeholder="例：旅行を楽しみたい、軽く踊りたい、楽に歩きたい"
              />

              <TextAreaField
                label="5. 今まで何を試しましたか？"
                value={sheet.tried}
                onChange={(value) => updateSheet('tried', value)}
                placeholder="例：ストレッチ、整体、運動、動画を見てセルフケア"
              />

              <TextAreaField
                label="6. 続かなかった理由、または限界は何でしたか？"
                value={sheet.limit}
                onChange={(value) => updateSheet('limit', value)}
                placeholder="例：やり方が合っているかわからない、痛くなる、習慣にならない"
              />

              <TextAreaField
                label="7. 「自分のせい」にしていたことはありますか？"
                value={sheet.selfBlame}
                onChange={(value) => updateSheet('selfBlame', value)}
                placeholder="例：年齢のせい、運動不足のせい、努力が足りないと思っていた"
              />

              <TextAreaField
                label="8. もしかすると、身体の構造や使い方の問題かもしれないことはありますか？"
                value={sheet.structure}
                onChange={(value) => updateSheet('structure', value)}
                placeholder="例：力の入り方、姿勢、呼吸、関節の動き方、身体の使い方"
              />

              <SelectField
                label="9. 今日、小さく観測してみたい場所はどこですか？"
                value={sheet.point}
                onChange={(value) => updateSheet('point', value)}
                options={observationPoints}
              />

              <SelectField
                label="10. 次の一歩として、今の自分に合いそうなものはどれですか？"
                value={sheet.nextStep}
                onChange={(value) => updateSheet('nextStep', value)}
                options={nextSteps}
              />

              <div className="flex flex-col sm:flex-row gap-3 pt-2">
                <button
                  type="button"
                  onClick={() => setShowMemo(true)}
                  className="w-full sm:w-auto rounded-lg bg-yellow-300 px-5 py-3 text-blue-950 text-sm font-bold tracking-widest hover:bg-yellow-200 transition-colors"
                >
                  観測メモをつくる
                </button>
                <button
                  type="button"
                  onClick={resetSheet}
                  className="w-full sm:w-auto rounded-lg border border-white/20 px-5 py-3 text-white/70 text-sm tracking-widest hover:text-white hover:border-white/40 transition-colors"
                >
                  入力をリセット
                </button>
              </div>
            </div>

            {showMemo && (
              <section className="mt-8 rounded-lg border border-yellow-200/25 bg-white/10 backdrop-blur-md p-5 sm:p-8 shadow-2xl fade-in">
                <p className="text-yellow-400 font-serif text-lg tracking-wider mb-2">
                  Observation Memo
                </p>
                <h2 className="text-white text-xl sm:text-2xl font-light tracking-widest mb-6">
                  今日の観測メモ
                </h2>

                <div className="space-y-4 text-white/85 text-sm sm:text-base leading-7">
                  <p><span className="text-white/50">今いちばん気になっていること：</span>{valueOrBlank(sheet.concern)}</p>
                  <p><span className="text-white/50">それが出やすい場面：</span>{valueOrBlank(sheet.scene)}</p>
                  <p><span className="text-white/50">避けていること：</span>{valueOrBlank(sheet.avoid)}</p>
                  <p><span className="text-white/50">変わったらしたいこと：</span>{valueOrBlank(sheet.hope)}</p>
                  <p><span className="text-white/50">今まで試したこと：</span>{valueOrBlank(sheet.tried)}</p>
                  <p><span className="text-white/50">続かなかった理由・限界：</span>{valueOrBlank(sheet.limit)}</p>
                  <p><span className="text-white/50">自分のせいにしていたこと：</span>{valueOrBlank(sheet.selfBlame)}</p>
                  <p><span className="text-white/50">構造や使い方として観測したいこと：</span>{valueOrBlank(sheet.structure)}</p>
                  <p><span className="text-white/50">今日の観測ポイント：</span>{valueOrBlank(sheet.point)}</p>
                  <p><span className="text-white/50">次の一歩：</span>{valueOrBlank(sheet.nextStep)}</p>
                </div>

                <div className="mt-7 border-t border-white/15 pt-5 text-white/75 text-sm sm:text-base leading-7">
                  <p>
                    今の観測では、
                    {sheet.point ? `「${sheet.point}」` : '身体の中で気になっている場所'}
                    にやさしく注目してみるとよさそうです。
                  </p>
                  <p className="mt-3">
                    すぐに変えようとするよりも、出やすい場面や、避けていることを記録してみるのもよさそうです。
                    次の一歩は「{valueOrBlank(sheet.nextStep)}」として、今の自分に合う距離感で選んでみてください。
                  </p>
                </div>
              </section>
            )}
          </section>
        </main>
      );
    }

    function StarMap() {
      const [constellation, setConstellation] = useState([]);
      const [activeStar, setActiveStar] = useState(null);
      const [inputText, setInputText] = useState('');

      const handleStarClick = (star) => {
        setActiveStar(star);
        setInputText('');
      };

      const handleSaveObservation = () => {
        if (!activeStar) return;

        setConstellation([
          ...constellation,
          {
            starId: activeStar.id,
            text: inputText || '（無言の観測）',
            timestamp: Date.now(),
          },
        ]);

        setActiveStar(null);
      };

      const handleReset = () => {
        setConstellation([]);
        setActiveStar(null);
      };

      return (
        <main className="relative z-20 w-full h-[100svh] overflow-hidden select-none">
          <div className="absolute top-24 left-0 w-full text-center z-20 pointer-events-none fade-in px-5">
            <h2 className="text-yellow-400 font-serif text-xl tracking-wider mb-1">
              Observe.
            </h2>
            <h1 className="text-white/90 text-sm font-light tracking-widest">
              気になる星（部位）をタップ
            </h1>
          </div>

          <svg className="absolute inset-0 w-full h-full pointer-events-none z-10">
            {constellation.map((record, index) => {
              if (index === 0) return null;

              const prevStar = BODY_STARS.find((star) => star.id === constellation[index - 1].starId);
              const currentStar = BODY_STARS.find((star) => star.id === record.starId);

              if (!prevStar || !currentStar) return null;

              return (
                <line
                  key={`line-${index}`}
                  x1={`${prevStar.x}%`}
                  y1={`${prevStar.y}%`}
                  x2={`${currentStar.x}%`}
                  y2={`${currentStar.y}%`}
                  stroke="rgba(253, 224, 71, 0.6)"
                  strokeWidth="1.5"
                  strokeDasharray="4 4"
                  className="line-draw-animation"
                />
              );
            })}
          </svg>

          <div className="absolute inset-0 z-20">
            {BODY_STARS.map((star) => {
              const isObserved = constellation.some((item) => item.starId === star.id);
              const isLatest =
                constellation.length > 0 &&
                constellation[constellation.length - 1].starId === star.id;

              return (
                <button
                  key={star.id}
                  type="button"
                  className="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center group cursor-pointer bg-transparent border-0"
                  style={{ left: `${star.x}%`, top: `${star.y}%` }}
                  onClick={() => handleStarClick(star)}
                  aria-label={`${star.name}を観測する`}
                >
                  <span
                    className={`text-xs tracking-widest mb-2 transition-all duration-500 ${
                      isObserved ? 'text-white/60' : 'text-transparent group-hover:text-white/40'
                    }`}
                  >
                    {star.name}
                  </span>

                  <span className="relative">
                    {isObserved && (
                      <span className="absolute -inset-3 bg-yellow-400/20 rounded-full animate-pulse"></span>
                    )}
                    <span
                      className={`block rounded-full transition-all duration-300 ${
                        isLatest
                          ? 'w-4 h-4 bg-yellow-300 shadow-[0_0_15px_rgba(253,224,71,0.8)]'
                          : isObserved
                          ? 'w-3 h-3 bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)]'
                          : 'w-2 h-2 bg-white/40 group-hover:bg-white/80'
                      }`}
                    ></span>
                  </span>
                </button>
              );
            })}
          </div>

          {constellation.length > 0 && (
            <div className="absolute bottom-8 left-5 right-5 sm:left-6 sm:right-auto z-20 fade-in max-w-sm">
              <div className="text-white/40 text-xs tracking-widest mb-2 font-serif">
                Log
              </div>
              <div className="flex flex-col space-y-2">
                {constellation.slice(-3).map((record, index) => {
                  const starName = BODY_STARS.find((star) => star.id === record.starId)?.name;

                  return (
                    <div
                      key={`${record.timestamp}-${index}`}
                      className="text-white/80 text-sm tracking-wide flex items-center gap-2"
                    >
                      <span className="text-yellow-400 text-xs">●</span>
                      <span className="opacity-60">{starName}:</span>
                      <span>{record.text}</span>
                    </div>
                  );
                })}
              </div>

              <button
                type="button"
                onClick={handleReset}
                className="mt-6 text-white/30 hover:text-white/60 text-xs tracking-widest transition-colors border-b border-white/20 pb-0.5"
              >
                観測をリセット
              </button>
            </div>
          )}

          {activeStar && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-blue-950/60 backdrop-blur-sm fade-in px-5">
              <div className="bg-white/10 border border-white/20 p-6 sm:p-8 rounded-lg w-full max-w-sm text-center shadow-2xl">
                <h3 className="text-yellow-400 font-serif text-lg tracking-wider mb-2">
                  Observe
                </h3>
                <p className="text-white text-xl tracking-widest mb-6">
                  「{activeStar.name}」は、
                  <br />
                  今どんな感じ？
                </p>

                <textarea
                  value={inputText}
                  onChange={(event) => setInputText(event.target.value)}
                  placeholder="例：水が流れるように、少し重い 等"
                  rows="3"
                  className="w-full bg-transparent border-b border-white/40 text-white text-center text-base pb-2 focus:outline-none focus:border-yellow-400 transition-colors mb-8 placeholder-white/25 resize-none"
                  autoFocus
                />

                <div className="flex justify-center gap-6">
                  <button
                    type="button"
                    onClick={() => setActiveStar(null)}
                    className="text-white/50 hover:text-white tracking-widest text-sm transition-colors"
                  >
                    やめる
                  </button>
                  <button
                    type="button"
                    onClick={handleSaveObservation}
                    className="text-white hover:text-yellow-400 tracking-widest text-sm font-bold transition-colors"
                  >
                    記録する
                  </button>
                </div>
              </div>
            </div>
          )}
        </main>
      );
    }

    function App() {
      const [mode, setMode] = useState('sheet');

      return (
        <div className="relative w-full min-h-[100svh] font-sans overflow-hidden bg-blue-950">
          <StarryBackground />

          <nav className="fixed top-5 left-1/2 -translate-x-1/2 z-40 flex rounded-full border border-white/15 bg-blue-950/55 backdrop-blur-md p-1 shadow-xl">
            <button
              type="button"
              onClick={() => setMode('sheet')}
              className={`rounded-full px-4 py-2 text-xs tracking-widest transition-colors ${
                mode === 'sheet'
                  ? 'bg-yellow-300 text-blue-950'
                  : 'text-white/65 hover:text-white'
              }`}
            >
              観測シート
            </button>
            <button
              type="button"
              onClick={() => setMode('stars')}
              className={`rounded-full px-4 py-2 text-xs tracking-widest transition-colors ${
                mode === 'stars'
                  ? 'bg-yellow-300 text-blue-950'
                  : 'text-white/65 hover:text-white'
              }`}
            >
              星図
            </button>
          </nav>

          {mode === 'sheet' ? <ObservatorySheet /> : <StarMap />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
